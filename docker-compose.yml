services:
  client:
    build:
      context: ./client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - server

  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://host.docker.internal:27017/HabitOS
      - JWT_SECRET=HabitJwt
    extra_hosts:
      - "host.docker.internal:host-gateway"